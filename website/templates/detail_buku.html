<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <title>{{ buku.judul }} | Ganesa</title>
</head>
<body class="bg-gray-50 font-sans">
    <div class="container mx-auto px-4 py-16">
        <div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row">
            
            <div class="md:w-1/3 bg-[#1D3557] p-12 flex items-center justify-center">
                {% if buku.cover %}
                    <img src="{{ buku.cover.url }}" class="w-full rounded-xl shadow-2xl transform -rotate-2">
                {% else %}
                    <div class="text-white text-center opacity-20">
                        <i class="fa-solid fa-book text-9xl"></i>
                        <p class="mt-4 italic">No Cover</p>
                    </div>
                {% endif %}
            </div>

            <div class="md:w-2/3 p-10 lg:p-16">
                <a href="javascript:history.back()" class="text-gray-400 hover:text-[#B5893E] font-bold mb-8 inline-block transition">
                    <i class="fa-solid fa-arrow-left mr-2"></i> KEMBALI
                </a>
                <h1 class="text-5xl font-black text-[#1D3557] mb-2 leading-tight">{{ buku.judul }}</h1>
                <p class="text-2xl text-[#B5893E] font-semibold mb-10">Penulis: {{ buku.penulis }}</p>
                
                <div class="border-t border-gray-100 pt-8">
                    <h3 class="font-bold text-[#1D3557] mb-4 uppercase text-sm tracking-[0.2em]">Sinopsis</h3>
                    <p class="text-gray-600 leading-relaxed text-lg italic text-justify">
                        "{{ buku.deskripsi|default:'Belum ada deskripsi untuk buku ini.' }}"
                    </p>
                </div>
            </div>

        </div>
    </div>
</body>
</html>
